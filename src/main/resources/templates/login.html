<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KinalApp — Iniciar sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/css/login.css" rel="stylesheet" />
</head>
<body>

<div class="login-wrapper">
    <div class="login-card" id="login-card">

        <!-- Logo y título -->
        <div class="login-brand">
            <div class="login-brand-icon">🌿</div>
            <div class="login-brand-name">KinalApp</div>
            <div class="login-brand-sub">Fundación Kinal · IN5AM · localhost:9000</div>
        </div>

        <!-- Mensaje de error global -->
        <div class="login-error-global" id="login-error-global"></div>

        <!-- Formulario de login -->
        <div id="login-form">

            <!-- Usuario -->
            <div class="mb-3">
                <label class="login-label" for="l-username">
                    Usuario <span style="color:#b83232">*</span>
                </label>
                <input id="l-username" type="text" class="login-input" placeholder="Ingresa tu username" autocomplete="off" maxlength="45" />
                <div class="ka-field-error" id="err-l-username">⚠ El usuario es obligatorio.</div>
            </div>

            <!-- Contraseña -->
            <div class="mb-3">
                <label class="login-label" for="l-password">
                    Contraseña <span style="color:#b83232">*</span>
                </label>
                <div class="login-input-wrap">
                    <input id="l-password" type="password" class="login-input login-input-with-btn" placeholder="Ingresa tu contraseña" autocomplete="off" />
                    <button class="btn-toggle-pass" id="btn-toggle-pass" type="button">
                        <span id="toggle-icon">👁</span>
                    </button>
                </div>
                <div class="ka-field-error" id="err-l-password">⚠ La contraseña es obligatoria.</div>
            </div>

            <!-- Botón ingresar -->
            <button class="btn-login" id="btn-login">
                <span class="login-spinner" id="login-spinner"></span>
                <span id="btn-login-text">Ingresar</span>
            </button>

        </div>

        <hr class="login-divider" />

        <!-- Enlace a registro -->
        <div class="register-link">
            <a href="/registro.html">¿No tienes cuenta? Regístrate aquí →</a>
        </div>

    </div>
    <div class="login-footer">
        KinalApp · Fundación Kinal · IN5AM · 2025
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/login.js" type="module"></script>

</body>
</html>
