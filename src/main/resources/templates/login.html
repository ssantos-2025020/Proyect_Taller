<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KinalApp — Iniciar sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="/css/login.css" rel="stylesheet" />
</head>
<body>

<div class="login-wrapper">
    <div class="login-card" id="login-card">

        <!-- Logo y título -->
        <div class="login-brand">
            <div class="login-brand-icon">🌿</div>
            <div class="login-brand-name">KinalApp</div>
            <div class="login-brand-sub">Fundación Kinal · IN5AM · localhost:9000</div>
        </div>

        <!-- Mensajes de Spring Security -->
        <div th:if="${param.error}" class="login-error-global" style="background:#fceaea; border:1px solid #e8a0a0; border-radius:8px; padding:8px 12px; margin-bottom:1rem;">
            ⚠ Usuario o contraseña incorrectos, o cuenta inactiva.
        </div>
        <div th:if="${param.logout}" class="login-error-global" style="background:#e8f0eb; border:1px solid #a8c8b0; border-radius:8px; padding:8px 12px; margin-bottom:1rem;">
            ✓ Sesión cerrada correctamente.
        </div>

        <!-- Formulario Thymeleaf → Spring Security -->
        <form th:action="@{/login}" method="post" id="login-form" novalidate>

            <!-- Usuario -->
            <div class="mb-3">
                <label class="login-label" for="username">
                    Usuario <span style="color:#b83232">*</span>
                </label>
                <input id="username" type="text" name="username" class="login-input" placeholder="Ingresa tu username" autocomplete="off" maxlength="45" required />
            </div>

            <!-- Contraseña -->
            <div class="mb-3">
                <label class="login-label" for="password">
                    Contraseña <span style="color:#b83232">*</span>
                </label>
                <div class="login-input-wrap">
                    <input id="password" type="password" name="password" class="login-input login-input-with-btn" placeholder="Ingresa tu contraseña" autocomplete="off" required />
                    <button class="btn-toggle-pass" id="btn-toggle-pass" type="button">
                        <span id="toggle-icon">👁</span>
                    </button>
                </div>
            </div>

            <!-- Botón ingresar -->
            <button type="submit" class="btn-login" id="btn-login">
                <span id="btn-login-text">Ingresar</span>
            </button>

        </form>

        <hr class="login-divider" />

        <!-- Enlace a registro -->
        <div class="register-link">
            <a href="/registro.html">¿No tienes cuenta? Regístrate aquí →</a>
        </div>

    </div>
    <div class="login-footer">
        KinalApp · Fundación Kinal · IN5AM · 2025
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Solo el toggle de mostrar contraseña (sin lógica de autenticación)
    document.getElementById('btn-toggle-pass')?.addEventListener('click', function () {
        const input = document.getElementById('password');
        const icon = document.getElementById('toggle-icon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.textContent = '🙈';
        } else {
            input.type = 'password';
            icon.textContent = '👁';
        }
    });
</script>

</body>
</html>
